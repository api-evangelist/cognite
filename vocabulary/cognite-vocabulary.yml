vocabulary:
  name: Cognite Data Fusion Vocabulary
  description: >
    Key terms and concepts used in the Cognite Data Fusion (CDF) platform covering
    industrial IoT, asset management, time series, data modeling, and contextualization
    for oil and gas, energy, manufacturing, and mining industries.
  version: "20230101"
  terms:
    - term: Asset
      definition: >
        A digital representation of a physical item in an industrial environment,
        such as a pump, compressor, tank, or plant. Assets are organized in a
        hierarchical tree structure with parent-child relationships. Each asset can
        have associated time series, events, files, and sequences.
      tags: [core, hierarchy, digital-twin]

    - term: Time Series
      definition: >
        A sequence of data points indexed in time order. In CDF, time series hold
        either numeric (float64) or string values and can be associated with physical
        assets. Time series support step-series behavior where the last value is held
        between measurement points. Datapoints can be retrieved as raw values or
        aggregates (average, min, max, count, sum, interpolation).
      tags: [core, iot, sensor-data]

    - term: Datapoint
      definition: >
        A single measurement within a time series, consisting of a timestamp
        (Unix epoch milliseconds) and a value (numeric or string). Bulk retrieval
        supports aggregation over configurable granularity windows.
      tags: [time-series, measurement]

    - term: Event
      definition: >
        A discrete occurrence with a start and optional end time, associated with
        one or more assets. Events are used to represent work orders, alarms, shutdowns,
        inspections, and other industrial occurrences. Events have a type, subtype,
        description, and custom metadata.
      tags: [core, operational]

    - term: CogniteExternalId
      definition: >
        A client-supplied string identifier (max 255 characters) that must be unique
        within a resource type in a project. External IDs allow clients to reference
        CDF resources using their own naming conventions without relying on
        server-generated internal IDs.
      tags: [identity, integration]

    - term: Data Set
      definition: >
        A logical grouping and governance boundary for data in CDF. Data sets enable
        data lineage tracking, access control, and quality monitoring. Each resource
        (asset, time series, event, file, etc.) can belong to one data set.
      tags: [governance, data-management]

    - term: Data Modeling
      definition: >
        CDF's flexible schema capability that allows customers to define custom
        industrial domain models using Spaces, Views, Containers, and Instances.
        Built on the concept of property graphs, data modeling replaces the classic
        resource types for complex relational industrial data.
      tags: [data-modeling, schema]

    - term: Space
      definition: >
        The top-level namespace in CDF Data Modeling. A space isolates a set of
        data model definitions (views, containers) and instances. Spaces provide
        multi-tenancy within a CDF project and are referenced by a unique string key.
      tags: [data-modeling, namespace]

    - term: Contextualization
      definition: >
        The process of linking data from different sources and systems to create
        meaningful context. CDF provides entity matching (ML-based linking of
        records across systems), engineering diagram parsing (P&ID recognition),
        and vision (computer vision for image/video analysis) to automate
        data contextualization.
      tags: [ai, integration, entity-matching]

    - term: Extraction Pipeline
      definition: >
        A CDF resource that represents a data ingestion pipeline extracting data
        from a source system (OT, IT, or ET). Extraction pipelines track the
        health, status, and metadata of each data integration, enabling monitoring
        of data flow into CDF.
      tags: [integration, data-ingestion, monitoring]

    - term: Transformation
      definition: >
        A SQL-based data processing job in CDF that reads from the CDF staging
        area (RAW) or resource types and writes results to CDF resource types
        or data model instances. Transformations run on schedules or on demand
        to build contextualized data products.
      tags: [data-processing, sql, etl]

    - term: Digital Twin
      definition: >
        A virtual representation of a physical industrial asset or process that
        integrates real-time and historical sensor data, 3D models, documents,
        and operational context. CDF serves as the foundation for industrial
        digital twins by unifying OT, IT, and ET data.
      tags: [digital-twin, industrial-iot]

    - term: RAW
      definition: >
        CDF's staging area for raw, unprocessed data from source systems. RAW
        organizes data into databases and tables with schema-free rows (JSON).
        It serves as a landing zone before data is transformed and contextualized
        into the CDF resource model.
      tags: [data-ingestion, staging]

    - term: Sequence
      definition: >
        A CDF resource for storing tabular, time-indexed data with multiple
        columns of different types (numeric or string). Sequences are suitable
        for trajectory data, lab results, event logs, and other multi-dimensional
        industrial measurements.
      tags: [core, tabular-data]

    - term: CDF Project
      definition: >
        The top-level tenancy boundary in Cognite Data Fusion. All resources
        (assets, time series, events, files, etc.) are scoped to a project.
        API endpoints include the project name in the URL path, e.g.
        https://api.cognitedata.com/{project}/assets.
      tags: [tenancy, administration]
