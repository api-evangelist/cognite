apis:
  - aid: cognite:cognite-data-fusion-api
    name: Cognite Data Fusion API
    description: >-
      The Cognite Data Fusion (CDF) REST API provides programmatic access to industrial
      data including assets, time series, events, files, sequences, 3D models, data
      modeling spaces and instances, entity matching for contextualization, SQL
      transformations, serverless functions, workflow orchestration, and SAP writeback.
      Supports OAuth 2.0 and API key authentication against project-scoped endpoints.
    humanURL: https://api-docs.cognite.com/
