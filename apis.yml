aid: cognite
name: Cognite
description: >-
  Cognite is an industrial AI and data platform provider whose core product, Cognite Data
  Fusion (CDF), contextualizes and integrates data from OT, IT, and ET systems across
  oil and gas, energy, manufacturing, and mining industries. CDF exposes a comprehensive
  REST API covering assets, time series, events, files, 3D models, data modeling,
  entity matching, transformations, functions, and workflows, with SDKs available for
  Python, JavaScript, Java, .NET, and Rust.
